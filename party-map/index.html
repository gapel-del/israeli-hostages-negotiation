      <div class="legend-item"><svg width="28" height="10" style="flex-shrink:0"><line x1="0" y1="5" x2="28" y2="5" stroke="#8b949e" stroke-width="2" stroke-dasharray="4,3"/></svg><span>Dashed = confidence &lt; 0.6</span></div>
      <div class="legend-item" style="margin-top:4px;font-size:11px;color:#8b949e">Thickness = strength × 5</div>
    </div>
  </div>

function parseTSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split('\t').map(h => h.trim());
  return lines.slice(1).map(line => {
    const cells = line.split('\t');
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (cells[i] || '').trim(); });
    return obj;
  }).filter(row => Object.values(row).some(v => v !== ''));
}

const NS = 'http://www.w3.org/2000/svg';

let actors = {};
let actorsList = [];
let episodes = [];
let allEdges = [];
let currentEpIndex = 0;

async function loadData() {
  const [actorsTSV, episodesTSV, edgesTSV] = await Promise.all([
    fetch('actors.tsv').then(r => r.text()),
    fetch('episodes.tsv').then(r => r.text()),
    fetch('edges.tsv').then(r => r.text()),
  ]);
  actorsList = parseTSV(actorsTSV);
  actorsList.forEach(a => { actors[a.actor_id] = a; });
  episodes = parseTSV(episodesTSV);
  allEdges = parseTSV(edgesTSV);
}

function offsetPoint(fx, fy, tx, ty, r) {
  const dx = tx - fx, dy = ty - fy;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  return [fx + (dx/len)*r, fy + (dy/len)*r];
}

function buildSVG(epId) {
  const svgEl = document.getElementById('map');
  while (svgEl.firstChild) svgEl.removeChild(svgEl.firstChild);

  // defs
  const defs = document.createElementNS(NS, 'defs');
  Object.entries(EDGE_COLORS).forEach(([type, color]) => {
    const marker = document.createElementNS(NS, 'marker');
    marker.setAttribute('id', `arrow-${type}`);
    marker.setAttribute('markerWidth', '8');
    marker.setAttribute('markerHeight', '6');
    marker.setAttribute('refX', '7');
    marker.setAttribute('refY', '3');
    marker.setAttribute('orient', 'auto');
    marker.setAttribute('markerUnits', 'strokeWidth');
    const poly = document.createElementNS(NS, 'polygon');
    poly.setAttribute('points', '0 0, 8 3, 0 6');
    poly.setAttribute('fill', color);
    marker.appendChild(poly);
    defs.appendChild(marker);
  });
  svgEl.appendChild(defs);

  // background
  const bg = document.createElementNS(NS, 'rect');
  bg.setAttribute('width', '960');
  bg.setAttribute('height', '700');
  bg.setAttribute('fill', '#0d1117');
  svgEl.appendChild(bg);

  // region labels
  const regions = [
    { x: 175, y: 25, text: 'ISRAEL', color: '#1f6feb' },
    { x: 480, y: 25, text: 'MEDIATORS', color: '#9e8a2e' },
    { x: 840, y: 25, text: 'HAMAS', color: '#b91c1c' },
  ];
  regions.forEach(r => {
    const t = document.createElementNS(NS, 'text');
    t.setAttribute('x', r.x);
    t.setAttribute('y', r.y);
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('fill', r.color);
    t.setAttribute('font-size', '11');
    t.setAttribute('font-family', 'Inter, sans-serif');
    t.setAttribute('font-weight', '600');
    t.setAttribute('letter-spacing', '2');
    t.setAttribute('opacity', '0.5');
    t.textContent = r.text;
    svgEl.appendChild(t);
  });

  // edges for this episode
  const epEdges = allEdges.filter(e => e.episode_id === epId);

  // build reverse-edge lookup for curve offset
  const edgeSet = new Set(epEdges.map(e => `${e.source_actor_id}|${e.target_actor_id}`));

  const edgeGroup = document.createElementNS(NS, 'g');
  edgeGroup.setAttribute('id', 'edges');
  svgEl.appendChild(edgeGroup);

  epEdges.forEach(edge => {
    const src = actors[edge.source_actor_id];
    const tgt = actors[edge.target_actor_id];
    if (!src || !tgt) return;

    const sx = parseFloat(src.x), sy = parseFloat(src.y);
    const tx = parseFloat(tgt.x), ty = parseFloat(tgt.y);
    const r1 = parseFloat(src.size_base) + 2;
    const r2 = parseFloat(tgt.size_base) + 2;
    const strength = parseFloat(edge.strength) || 0.5;
    const confidence = parseFloat(edge.confidence) || 1.0;

    // check if reverse edge exists
    const hasReverse = edgeSet.has(`${edge.target_actor_id}|${edge.source_actor_id}`);
    const offset = hasReverse ? 28 : 0;

    // midpoint + perpendicular offset for curve
    const mx = (sx + tx) / 2, my = (sy + ty) / 2;
    const dx = tx - sx, dy = ty - sy;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    const cpx = mx + (-dy / len) * offset;
    const cpy = my + (dx / len) * offset;

    // offset start/end points by node radius
    const [sx2, sy2] = offsetPoint(cpx, cpy, sx, sy, -(r1));
    const [tx2, ty2] = offsetPoint(cpx, cpy, tx, ty, -(r2));

    // actual start offset from node
    const [startX, startY] = offsetPoint(sx, sy, tx, ty, r1);
    const [endX, endY]     = offsetPoint(tx, ty, sx, sy, r2 + 5);

    const color = EDGE_COLORS[edge.rel_type] || '#8b949e';
    const strokeW = Math.max(1, strength * 5);

    const path = document.createElementNS(NS, 'path');
    let d;
    if (offset === 0) {
      d = `M ${startX} ${startY} L ${endX} ${endY}`;
    } else {
      d = `M ${startX} ${startY} Q ${cpx} ${cpy} ${endX} ${endY}`;
    }
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', strokeW);
    path.setAttribute('opacity', '0.75');
    path.setAttribute('marker-end', `url(#arrow-${edge.rel_type})`);
    if (confidence < 0.6) {
      path.setAttribute('stroke-dasharray', `${strokeW*3} ${strokeW*2}`);
    }
    path.setAttribute('data-src', edge.source_actor_id);
    path.setAttribute('data-tgt', edge.target_actor_id);
    path.setAttribute('data-rel', edge.rel_type);
    path.setAttribute('data-notes', edge.notes || '');
    edgeGroup.appendChild(path);
  });

  // nodes
  const nodeGroup = document.createElementNS(NS, 'g');
  nodeGroup.setAttribute('id', 'nodes');
  svgEl.appendChild(nodeGroup);

  actorsList.forEach(actor => {
    const x = parseFloat(actor.x), y = parseFloat(actor.y);
    const r = parseFloat(actor.size_base);
    const color = COLOR_KEYS[actor.color_key] || '#8b949e';

    const g = document.createElementNS(NS, 'g');
    g.setAttribute('cursor', 'pointer');
    g.setAttribute('data-id', actor.actor_id);

    const circle = document.createElementNS(NS, 'circle');
    circle.setAttribute('cx', x);
    circle.setAttribute('cy', y);
    circle.setAttribute('r', r);
    circle.setAttribute('fill', color);
    circle.setAttribute('stroke', '#0d1117');
    circle.setAttribute('stroke-width', '2');
    g.appendChild(circle);

    // label
    const text = document.createElementNS(NS, 'text');
    text.setAttribute('x', x);
    text.setAttribute('y', y + r + 11);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('fill', '#c9d1d9');
    text.setAttribute('font-size', '9.5');
    text.setAttribute('font-family', 'Inter, sans-serif');
    text.setAttribute('pointer-events', 'none');

    // wrap long labels
    const words = actor.label.split(' ');
    let line = '';
    const maxW = 80;
    let lineCount = 0;
    words.forEach((word, i) => {
      const testLine = line ? line + ' ' + word : word;
      if (testLine.length > 12 && line && i > 0) {
        const tspan = document.createElementNS(NS, 'tspan');
        tspan.setAttribute('x', x);
        tspan.setAttribute('dy', lineCount === 0 ? '0' : '10');
        tspan.textContent = line;
        text.appendChild(tspan);
        line = word;
        lineCount++;
      } else {
        line = testLine;
      }
    });
    if (line) {
      const tspan = document.createElementNS(NS, 'tspan');
      tspan.setAttribute('x', x);
      tspan.setAttribute('dy', lineCount === 0 ? '0' : '10');
      tspan.textContent = line;
      text.appendChild(tspan);
    }

    g.appendChild(text);

    g.addEventListener('mouseenter', (e) => showTooltip(e, actor, epId));
    g.addEventListener('mousemove', moveTooltip);
    g.addEventListener('mouseleave', hideTooltip);

    nodeGroup.appendChild(g);
  });
}

function showTooltip(e, actor, epId) {
  const tt = document.getElementById('tooltip');
  const info = (ACTOR_EP_INFO[epId] || {})[actor.actor_id];

  let html = `<div class="tt-label">${actor.label}</div>`;
  html += `<div class="tt-meta">${actor.side} · ${actor.node_type.replace(/_/g,' ')}</div>`;

  if (info) {
    if (info.obj && info.obj.length) {
      html += `<div class="tt-section">Objectives</div>`;
      info.obj.forEach(o => { html += `<div class="tt-obj">▸ ${o}</div>`; });
    }
    if (info.red && info.red.length) {
      html += `<div class="tt-section">Red Lines</div>`;
      info.red.forEach(r => { html += `<div class="tt-red">✕ ${r}</div>`; });
    }
  } else {
    html += `<div style="color:#8b949e;margin-top:4px;font-size:11px">No episode-specific data</div>`;
  }

  tt.innerHTML = html;
  tt.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const tt = document.getElementById('tooltip');
  const margin = 16;
  let x = e.clientX + margin;
  let y = e.clientY + margin;
  const w = tt.offsetWidth, h = tt.offsetHeight;
  if (x + w > window.innerWidth - 8) x = e.clientX - w - margin;
  if (y + h > window.innerHeight - 8) y = e.clientY - h - margin;
  tt.style.left = x + 'px';
  tt.style.top  = y + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

function buildLegend() {
  const nodeLeg = document.getElementById('node-legend');
  Object.entries(COLOR_KEYS).forEach(([key, color]) => {
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.innerHTML = `<div class="legend-dot" style="background:${color}"></div><span>${COLOR_KEY_LABELS[key]||key}</span>`;
    nodeLeg.appendChild(div);
  });

  const edgeLeg = document.getElementById('edge-legend');
  Object.entries(EDGE_COLORS).forEach(([type, color]) => {
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.innerHTML = `<svg class="legend-arrow" width="28" height="10" xmlns="http://www.w3.org/2000/svg"><defs><marker id="leg-arr-${type}" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto"><polygon points="0 0, 6 2.5, 0 5" fill="${color}"/></marker></defs><line x1="0" y1="5" x2="22" y2="5" stroke="${color}" stroke-width="2" marker-end="url(#leg-arr-${type})"/></svg><span>${EDGE_LABELS[type]||type}</span>`;
    edgeLeg.appendChild(div);
  });
}

function updateEpisodeInfo(ep) {
  document.getElementById('ep-title').textContent = ep.label;
  document.getElementById('ep-dates').textContent = `${ep.start_date} – ${ep.end_date}`;
  document.getElementById('ep-summary').textContent = ep.short_summary;
  document.getElementById('ep-counts').textContent = ep.hostage_counts_by_phase;
}

function setEpisode(index) {
  currentEpIndex = index;
  const ep = episodes[index];
  if (!ep) return;
  document.getElementById('ep-slider').value = index;
  document.getElementById('ep-select').value = ep.episode_id;
  updateEpisodeInfo(ep);
  buildSVG(ep.episode_id);
}

function exportCurrentView() {
  const ep = episodes[currentEpIndex];
  if (!ep) return;

  // edges TSV
  const epEdges = allEdges.filter(e => e.episode_id === ep.episode_id);
  const edgeHeaders = ['episode_id','source_actor_id','target_actor_id','rel_type','strength','confidence','issue_tags','notes'];
  const edgeRows = [edgeHeaders.join('\t')];
  epEdges.forEach(e => {
    edgeRows.push(edgeHeaders.map(h => e[h]||'').join('\t'));
  });
  downloadFile(`edges-${ep.episode_id}.tsv`, edgeRows.join('\n'), 'text/tab-separated-values');

  // actors TSV
  const actorHeaders = ['actor_id','label','side','node_type','x','y','color_key','size_base'];
  const actorRows = [actorHeaders.join('\t')];
  actorsList.forEach(a => {
    actorRows.push(actorHeaders.map(h => a[h]||'').join('\t'));
  });
  downloadFile(`actors.tsv`, actorRows.join('\n'), 'text/tab-separated-values');
}

function downloadFile(filename, content, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
}

async function init() {
  await loadData();

  // populate select
  const sel = document.getElementById('ep-select');
  episodes.forEach((ep, i) => {
    const opt = document.createElement('option');
    opt.value = ep.episode_id;
    opt.textContent = `${i+1}. ${ep.label}`;
    sel.appendChild(opt);
  });

  document.getElementById('ep-slider').max = episodes.length - 1;

  sel.addEventListener('change', () => {
    const idx = episodes.findIndex(e => e.episode_id === sel.value);
    if (idx >= 0) setEpisode(idx);
  });

  document.getElementById('ep-slider').addEventListener('input', e => {
    setEpisode(parseInt(e.target.value, 10));
  });

  document.getElementById('export-btn').addEventListener('click', exportCurrentView);

  buildLegend();
  setEpisode(0);
}

init().catch(err => {
  console.error('Failed to load data:', err);
  document.getElementById('ep-summary').textContent = 'Error loading data: ' + err.message + '. Make sure to serve this file via a local HTTP server (e.g. python -m http.server 8080).';
});
</script>
</body>
</html>
