// ── SVG helpers ───────────────────────────────────────────────────────────────
const NS = 'http://www.w3.org/2000/svg';

function svgEl(tag, attrs) {
  const el = document.createElementNS(NS, tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  return el;
}

function svgText(parent, txt, attrs) {
  const el = svgEl('text', attrs);
  el.textContent = txt;
  parent.appendChild(el);
  return el;
}

// ── Pill label truncation ─────────────────────────────────────────────────────
function truncLabel(label, maxLen) {
  if (!label || label.length <= maxLen) return label || '';
  // Try to break at a word boundary
  const cut = label.slice(0, maxLen - 1);
  const lastSpace = cut.lastIndexOf(' ');
  return (lastSpace > maxLen - 6 ? cut.slice(0, lastSpace) : cut) + '…';
}

// ── TSV parser ────────────────────────────────────────────────────────────────
function parseTSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split('\t').map(h => h.trim());
  return lines.slice(1).map(line => {
    const cells = line.split('\t');
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (cells[i] || '').trim(); });
    return obj;
  }).filter(row => Object.values(row).some(v => v !== ''));
}

// ── Group region helpers ──────────────────────────────────────────────────────

  y = y || 0;
  if (y > 550) return 'international';
  if (x < 310) return 'israel';
  if (x < 800) return 'mediator';
  return 'hamas';
}

// ── drawNode ──────────────────────────────────────────────────────────────────
function drawNode(parent, actor, active, epId, tooltip) {
  const x = actor.x, y = actor.y;
  const ck = actor.color_key;
  const bg = NODE_BG[ck] || '#111';
  const stroke = NODE_STROKE[ck] || '#555';
  const opacity = active ? 1 : 0.22;
  const region = getRegion(x, y);

  // Pill dimensions by region
  const isIntl = region === 'international';
  const pw = isIntl ? 148 : 210;   // pill half-width
  const ph = 30;                    // pill height
  const dotCx = -(pw/2 - 14);      // dot position
  const textX  = -(pw/2 - 24);     // text start
  const maxChars = isIntl ? 22 : 30;

  const g = svgEl('g', {
    class: 'actor',
    transform: `translate(${x},${y})`,
    opacity,
    cursor: 'pointer',
    'data-id': actor.actor_id,
  });

  // Pill background
  g.appendChild(svgEl('rect', {
    x: -(pw/2), y: -(ph/2), width: pw, height: ph, rx: ph/2,
    fill: bg, stroke, 'stroke-width': 1.2,
  }));

  // Type dot
  g.appendChild(svgEl('circle', {
    cx: dotCx, cy: 0, r: 4.5,
    fill: stroke, opacity: 0.9,
  }));

  // Label text — no truncation for most, only if truly too long
  const label = truncLabel(actor.label, maxChars);
  const textEl = svgEl('text', {
    x: textX, y: 4,
    'font-size': 10.5,
    fill: '#e6edf3',
    'font-family': 'Inter,sans-serif',
    'pointer-events': 'none',
  });
  textEl.textContent = label;
  g.appendChild(textEl);

  // Tooltip events
  g.addEventListener('mouseenter', (e) => showTooltip(e, actor, epId, tooltip));
  g.addEventListener('mousemove', (e) => moveTooltip(e, tooltip));
  g.addEventListener('mouseleave', () => hideTooltip(tooltip));

  parent.appendChild(g);
}

// ── drawEdge ──────────────────────────────────────────────────────────────────
function getPillHalf(x, y) {
  return getRegion(x, y) === 'international' ? 74 : 105;
}

function pillEdgePoint(ax, ay, bx, by) {
  const ph = getPillHalf(ax, ay);
  const dx = bx - ax, dy = by - ay;
  const len = Math.sqrt(dx * dx + dy * dy) || 1;
  return [ax + (dx / len) * ph, ay + (dy / len) * ph];
}

function drawEdge(parent, src, tgt, edge) {
  const sx = src.x, sy = src.y;
  const tx = tgt.x, ty = tgt.y;
  const color = EDGE_COLORS[edge.rel_type] || '#8b949e';
  const strength = parseFloat(edge.strength) || 0.5;
  const confidence = parseFloat(edge.confidence) || 1.0;
  const strokeW = Math.max(1, strength * 5);

  const srcRegion = getRegion(sx, sy);
  const tgtRegion = getRegion(tx, ty);
  const sameGroup = srcRegion === tgtRegion;

  let d;

  if (sameGroup) {
    // Intra-group: gentle arc out past the group edge so overlapping lines separate
    let outX;
    if (srcRegion === 'israel')   outX = 305;
    else if (srcRegion === 'hamas')    outX = 1088;
    else if (srcRegion === 'mediator') outX = 782;
    else outX = Math.max(sx, tx) + 60;

    const [sx2, sy2] = pillEdgePoint(sx, sy, outX, sy);
    const [tx2, ty2] = pillEdgePoint(tx, ty, outX, ty);
    d = `M ${sx2} ${sy2} C ${outX} ${sy} ${outX} ${ty} ${tx2} ${ty2}`;
  } else if (tgtRegion === 'international' || srcRegion === 'international') {
    // Straight line to/from international row
    const [sx2, sy2] = pillEdgePoint(sx, sy, tx, ty);
    const [tx2, ty2] = pillEdgePoint(tx, ty, sx, sy);
    d = `M ${sx2} ${sy2} L ${tx2} ${ty2}`;
  } else {
    // Inter-group: straight line
    const [sx2, sy2] = pillEdgePoint(sx, sy, tx, ty);
    const [tx2, ty2] = pillEdgePoint(tx, ty, sx, sy);
    d = `M ${sx2} ${sy2} L ${tx2} ${ty2}`;
  }

  const path = svgEl('path', {
    d,
    fill: 'none',
    stroke: color,
    'stroke-width': strokeW,
    opacity: 0.8,
    'marker-end': `url(#arr-${edge.rel_type})`,
    'pointer-events': 'none',
  });

  if (confidence < 0.6) {
    path.setAttribute('stroke-dasharray', '6 4');
  }

  // Wide invisible hit-area for easy hovering
  const ttEl = document.getElementById('tooltip');
  const hit = svgEl('path', {
    d,
    fill: 'none',
    stroke: 'transparent',
    'stroke-width': 14,
    cursor: 'crosshair',
  });
  hit.addEventListener('mouseenter', (e) => showEdgeTooltip(e, edge, src, tgt, color, ttEl));
  hit.addEventListener('mousemove',  (e) => moveTooltip(e, ttEl));
  hit.addEventListener('mouseleave', ()  => hideTooltip(ttEl));

  parent.appendChild(path);
  parent.appendChild(hit);
}

// ── Edge Tooltip ──────────────────────────────────────────────────────────────
function showEdgeTooltip(e, edge, src, tgt, color, ttEl) {
  const conf  = parseFloat(edge.confidence) || 1;
  const str   = parseFloat(edge.strength)   || 0;
  const bars  = '█'.repeat(Math.round(str * 5)) + '░'.repeat(5 - Math.round(str * 5));
  const tags  = (edge.issue_tags || '').split('|').filter(Boolean).map(t => t.replace(/_/g,' ')).join(' · ');
  const notes = (edge.notes || '').trim();
  const relLabel = EDGE_LABELS[edge.rel_type] || edge.rel_type;
  const confLabel = conf >= 0.8 ? 'High' : conf >= 0.6 ? 'Moderate' : 'Low';

  let html = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:0.35rem">`;
  html += `<div style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></div>`;
  html += `<strong style="color:#e6edf3;font-size:0.82rem">${relLabel}</strong></div>`;
  html += `<div class="tt-meta">${src.label} → ${tgt.label}</div>`;
  html += `<div style="margin:0.4rem 0;display:flex;gap:1rem;font-size:0.7rem">`;
  html += `<span>Strength <span style="color:#e3b341;font-family:monospace">${bars}</span></span>`;
  html += `<span>Confidence <span style="color:${conf>=0.6?'#3fb950':'#f85149'}">${confLabel}</span></span>`;
  html += `</div>`;
  if (tags) html += `<div class="tt-sec">Issues</div><div style="color:#8b949e;font-size:0.72rem">${tags}</div>`;
  if (notes) html += `<div class="tt-sec" style="margin-top:0.4rem">Notes</div><div style="color:#cdd5df;font-size:0.73rem;line-height:1.5">${notes}</div>`;

  ttEl.innerHTML = html;
  ttEl.style.display = 'block';
  moveTooltip(e, ttEl);
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
function showTooltip(e, actor, epId, ttEl) {
  const info = (ACTOR_EP_INFO[epId] || {})[actor.actor_id];
  let html = `<h3>${actor.label}</h3>`;
  html += `<div class="tt-meta">${actor.side} · ${actor.node_type.replace(/_/g,' ')}</div>`;
  if (info) {
    if (info.obj && info.obj.length) {
      html += `<div class="tt-sec">Objectives</div>`;
      info.obj.forEach(o => { html += `<div class="tt-obj">▸ ${o}</div>`; });
    }
    if (info.red && info.red.length) {
      html += `<div class="tt-sec">Red Lines</div>`;
      info.red.forEach(r => { html += `<div class="tt-red">✕ ${r}</div>`; });
    }
  } else {
    html += `<div class="tt-none">No episode-specific data</div>`;
  }
  ttEl.innerHTML = html;
  ttEl.style.display = 'block';
  moveTooltip(e, ttEl);
}

function moveTooltip(e, ttEl) {
  const margin = 16;
  let x = e.clientX + margin;
  let y = e.clientY + margin;
  const w = ttEl.offsetWidth, h = ttEl.offsetHeight;
  if (x + w > window.innerWidth - 8) x = e.clientX - w - margin;
  if (y + h > window.innerHeight - 8) y = e.clientY - h - margin;
  ttEl.style.left = x + 'px';
  ttEl.style.top = y + 'px';
}

function hideTooltip(ttEl) {
  ttEl.style.display = 'none';
}

// ── drawMap ───────────────────────────────────────────────────────────────────
function drawMap(actors, actorMap, epEdges, ep) {
  const svg = document.getElementById('map');
  const ttEl = document.getElementById('tooltip');

  // Remove dynamic layers only
  svg.querySelectorAll('.layer-groups,.layer-edges,.layer-nodes').forEach(el => el.remove());

  // Active actors set
  const activeIds = new Set();
  epEdges.forEach(e => {
    activeIds.add(e.source_actor_id);
    activeIds.add(e.target_actor_id);
  });

  // Groups layer
  const gGroups = svgEl('g', { class: 'layer-groups' });
  drawGroups(gGroups);
  svg.appendChild(gGroups);

  // Edges layer
  const gEdges = svgEl('g', { class: 'layer-edges' });
  epEdges.forEach(edge => {
    const src = actorMap[edge.source_actor_id];
    const tgt = actorMap[edge.target_actor_id];
    if (!src || !tgt) return;
    drawEdge(gEdges, src, tgt, edge);
  });
  svg.appendChild(gEdges);

  // Nodes layer
  const gNodes = svgEl('g', { class: 'layer-nodes' });
  actors.forEach(actor => {
    drawNode(gNodes, actor, activeIds.has(actor.actor_id), ep.episode_id, ttEl);
  });
  svg.appendChild(gNodes);
}

// ── Build SVG defs (once) ─────────────────────────────────────────────────────
function buildDefs() {
  const svg = document.getElementById('map');

  // Background
  svg.appendChild(svgEl('rect', { width: 1100, height: 680, fill: '#0d1117' }));

  const defs = svgEl('defs');
  Object.entries(EDGE_COLORS).forEach(([r, color]) => {
    const m = svgEl('marker', {
      id: `arr-${r}`,
      markerWidth: 12,
      markerHeight: 8,
      refX: 12,
      refY: 4,
      orient: 'auto',
      markerUnits: 'userSpaceOnUse',
    });
    const poly = svgEl('polygon', { points: '0 0, 12 4, 0 8', fill: color });
    m.appendChild(poly);
    defs.appendChild(m);
  });
  svg.appendChild(defs);
}

// ── Legend bar ────────────────────────────────────────────────────────────────
function buildLegend() {
  const bar = document.getElementById('legendBar');
  Object.entries(EDGE_COLORS).forEach(([type, color]) => {
    const item = document.createElement('div');
    item.className = 'leg-item';
    item.innerHTML = `<div class="leg-line" style="width:28px;background:${color}"></div><span>${EDGE_LABELS[type]}</span>`;
    bar.insertBefore(item, bar.lastElementChild);
  });
}

// ── Main ──────────────────────────────────────────────────────────────────────
Promise.all([
  fetch('./actors.tsv').then(r => r.text()),
  fetch('./episodes.tsv').then(r => r.text()),
  fetch('./edges.tsv').then(r => r.text()),
]).then(([aTsv, eTsv, edgeTsv]) => {
  const actors = parseTSV(aTsv);
  const episodes = parseTSV(eTsv);
  const edges = parseTSV(edgeTsv);

  // Coerce numeric fields
  const actorMap = {};
  actors.forEach(a => {
    a.x = +a.x; a.y = +a.y; a.size_base = +a.size_base;
    actorMap[a.actor_id] = a;
  });

  buildDefs();
  buildLegend();

  // Episode dropdown
  const dropdown = document.getElementById('dropdown');
  const slider = document.getElementById('slider');
  slider.max = episodes.length - 1;

  episodes.forEach((ep, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${i + 1}. ${ep.label}`;
    dropdown.appendChild(opt);
  });

  let currentEp = 0;

  function render(epIdx) {
    currentEp = epIdx;
    const ep = episodes[epIdx];
    if (!ep) return;
    document.getElementById('episodeTitle').textContent = ep.label;
    document.getElementById('episodeDates').textContent = (ep.start_date || '') + ' → ' + (ep.end_date || '');
    document.getElementById('summary').textContent = ep.short_summary || '';
    document.getElementById('counts').textContent = ep.hostage_counts_by_phase || '';
    slider.value = epIdx;
    dropdown.value = epIdx;

    const epEdges = edges.filter(e => e.episode_id === ep.episode_id);
    drawMap(actors, actorMap, epEdges, ep);
    drawSimplified(epEdges);
  }

  slider.addEventListener('input', () => render(+slider.value));
  dropdown.addEventListener('change', () => render(+dropdown.value));

  // Export
  document.getElementById('exportBtn').addEventListener('click', () => {
    const ep = episodes[currentEp];
    if (!ep) return;
    const epEdges = edges.filter(e => e.episode_id === ep.episode_id);

    const edgeHeaders = ['episode_id','source_actor_id','target_actor_id','rel_type','strength','confidence','issue_tags','notes'];
    const eTSV = [edgeHeaders.join('\t'),
      ...epEdges.map(e => edgeHeaders.map(h => e[h] || '').join('\t'))
    ].join('\n');
    dl(`${ep.episode_id}-edges.tsv`, eTSV);

    const actorHeaders = ['actor_id','label','side','node_type','x','y','color_key','size_base'];
    const aTSV = [actorHeaders.join('\t'),
      ...actors.map(a => actorHeaders.map(h => a[h] !== undefined ? a[h] : '').join('\t'))
    ].join('\n');
    dl('actors.tsv', aTSV);
  });

  function dl(name, content) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content], { type: 'text/plain' }));
    a.download = name;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
  }

  // ══════════════════════════════════════════════════════
  // SIMPLIFIED MAP
  // ══════════════════════════════════════════════════════

  const SIMP_ACTORS = [
    // Israel column (x≈140)
    { id:'sg_israel_gov', label:'Israeli Government',    x:140, y:115, color:'#388bfd', bg:'#0d2a56' },
    { id:'sg_israel_civ', label:'Israeli Civil Society', x:140, y:225, color:'#1f6feb', bg:'#0a1e3d' },
    // Mediators (x≈500)
    { id:'sg_us',    label:'United States', x:500, y: 85, color:'#e3b341', bg:'#3d2e00' },
    { id:'sg_qatar', label:'Qatar',         x:500, y:175, color:'#e3b341', bg:'#3d2e00' },
    { id:'sg_egypt', label:'Egypt',         x:500, y:265, color:'#e3b341', bg:'#3d2e00' },
    { id:'sg_turkey',label:'Turkey',        x:500, y:345, color:'#c9943a', bg:'#2a1e00' },
    // Hamas column (x≈860)
    { id:'sg_hamas_pol', label:'Hamas Political', x:860, y:115, color:'#da3633', bg:'#3d0d0c' },
    { id:'sg_hamas_mil', label:'Hamas Military',  x:860, y:225, color:'#b91c1c', bg:'#280807' },
    // International row (y≈430)
    { id:'sg_icrc',       label:'ICRC',                x:130, y:430, color:'#bc8cff', bg:'#1e1040' },
    { id:'sg_un',         label:'UN Bodies',            x:300, y:430, color:'#bc8cff', bg:'#1e1040' },
    { id:'sg_foreign',    label:'Foreign Governments',  x:500, y:430, color:'#bc8cff', bg:'#1e1040' },
    { id:'sg_monitoring', label:'Intl Monitoring',      x:710, y:430, color:'#bc8cff', bg:'#1e1040' },
    { id:'sg_diaspora',   label:'Diaspora Groups',      x:890, y:430, color:'#bc8cff', bg:'#1e1040' },
  ];

  const SIMP_ACTOR_MAP = {
    netanyahu:          'sg_israel_gov',
    israel_exec:        'sg_israel_gov',
    israel_neg:         'sg_israel_gov',
    idf:                'sg_israel_gov',
    hostage_coord:      'sg_israel_gov',
    far_right_bloc:     'sg_israel_gov',
    opposition_bloc:    'sg_israel_gov',
    hostage_families:   'sg_israel_civ',
    israel_public:      'sg_israel_civ',
    us:                 'sg_us',
    qatar:              'sg_qatar',
    egypt:              'sg_egypt',
    turkey:             'sg_turkey',
    hamas_doha:         'sg_hamas_pol',
    hayya:              'sg_hamas_pol',
    hamas_pol:          'sg_hamas_pol',
    hamas_mil:          'sg_hamas_mil',
    hamas_hardline:     'sg_hamas_mil',
    other_factions:     'sg_hamas_mil',
    icrc:               'sg_icrc',
    unsc:               'sg_un',
    un_humanitarian:    'sg_un',
    foreign_govts:      'sg_foreign',
    diaspora_pro_israel:'sg_diaspora',
    diaspora_pro_pal:   'sg_diaspora',
    intl_monitoring:    'sg_monitoring',
    eu_mission:         'sg_monitoring',
  };

  // Build lookup for simplified actors
  const simpActorMap = {};
  SIMP_ACTORS.forEach(a => { simpActorMap[a.id] = a; });

  // Aggregate detailed edges → simplified edges (keep highest-strength per source→target→rel_type pair)
  function aggregateSimpEdges(epEdges) {
    const map = {};
    epEdges.forEach(e => {
      const sid = SIMP_ACTOR_MAP[e.source_actor_id];
      const tid = SIMP_ACTOR_MAP[e.target_actor_id];
      if (!sid || !tid || sid === tid) return;
      const key = `${sid}→${tid}→${e.rel_type}`;
      const str = parseFloat(e.strength) || 0;
      if (!map[key] || str > parseFloat(map[key].strength)) {
        map[key] = { ...e, source_actor_id: sid, target_actor_id: tid };
      }
    });
    return Object.values(map);
  }

  // Draw the simplified SVG (builds from scratch each episode)
  function drawSimplified(epEdges) {
    const svg = document.getElementById('simpMap');
    // Clear
    while (svg.firstChild) svg.removeChild(svg.firstChild);

    // Background
    svg.appendChild(svgEl('rect', { width:1000, height:500, fill:'#0d1117' }));

    // ── Group boxes ──────────────────────────────────────────────
    function sBox(x, y, w, h, fill, stroke, label, lx, ly) {
      svg.appendChild(svgEl('rect', { x, y, width:w, height:h, rx:10,
        fill, stroke, 'stroke-width':1.5 }));
      if (label) {
        const t = svgEl('text', { x:lx, y:ly, 'text-anchor':'middle',
          fill:stroke, 'font-size':10, 'font-weight':700, 'letter-spacing':2,
          'font-family':'Inter,sans-serif', 'pointer-events':'none' });
        t.textContent = label;
        svg.appendChild(t);
      }
    }

    sBox(10,  10, 268, 270, 'rgba(56,139,253,0.06)',  '#1f6feb', 'ISRAEL',    144, 27);
    sBox(300, 10, 400, 380, 'rgba(227,179,65,0.06)',  '#e3b341', 'MEDIATORS', 500, 27);
    sBox(722, 10, 268, 270, 'rgba(218,54,51,0.06)',   '#da3633', 'HAMAS',     856, 27);
    sBox(10, 390, 980, 100, 'rgba(188,140,255,0.06)', '#bc8cff', 'INTERNATIONAL & EXTERNAL', 500, 405);

    // Active simplified actors (those involved in at least one edge)
    const simpEdges = aggregateSimpEdges(epEdges);
    const activeIds = new Set();
    simpEdges.forEach(e => { activeIds.add(e.source_actor_id); activeIds.add(e.target_actor_id); });

    // ── Edges ─────────────────────────────────────────────────────
    const ttEl = document.getElementById('tooltip');

    simpEdges.forEach(e => {
      const src = simpActorMap[e.source_actor_id];
      const tgt = simpActorMap[e.target_actor_id];
      if (!src || !tgt) return;

      const color = EDGE_COLORS[e.rel_type] || '#8b949e';
      const str   = parseFloat(e.strength) || 0.5;
      const conf  = parseFloat(e.confidence) || 1;
      const sw    = Math.max(1.5, str * 5);

      const sx = src.x, sy = src.y, tx = tgt.x, ty = tgt.y;
      const PH = 90; // pill half-width for simplified
      const dx = tx-sx, dy = ty-sy;
      const len = Math.sqrt(dx*dx+dy*dy)||1;
      const sx2 = sx+(dx/len)*PH, sy2 = sy+(dy/len)*PH;
      const tx2 = tx-(dx/len)*PH,          ty2 = ty-(dy/len)*PH;

      // Route edges
      const srcIntl = sy > 380, tgtIntl = ty > 380;
      const inIsrael = sx < 280 && tx < 280 && !srcIntl && !tgtIntl;
      const inHamas  = sx > 720 && tx > 720 && !srcIntl && !tgtIntl;
      let d;
      if (srcIntl || tgtIntl) {
        // To/from international row — quadratic curve
        const cpx = (sx+tx)/2, cpy = (sy+ty)/2 + 20;
        d = `M ${sx2} ${sy2} Q ${cpx} ${cpy} ${tx2} ${ty2}`;
      } else if (inIsrael || inHamas) {
        // Intra-group (same column) — curve outward; keep control points inside viewBox
        const dir  = inIsrael ? -1 : 1;
        const outX = inIsrael ? 20 : 980;
        const sx2g = sx + dir * PH, sy2g = sy;
        const tx2g = tx + dir * PH, ty2g = ty;
        d = `M ${sx2g} ${sy2g} C ${outX} ${sy} ${outX} ${ty} ${tx2g} ${ty2g}`;
      } else {
        // Inter-group and international — straight line
        d = `M ${sx2} ${sy2} L ${tx2} ${ty2}`;
      }

      const path = svgEl('path', { d, fill:'none', stroke:color, 'stroke-width':sw,
        opacity:0.85, 'marker-end':`url(#arr-${e.rel_type})`, 'pointer-events':'none' });
      if (conf < 0.6) path.setAttribute('stroke-dasharray','6 4');
      svg.appendChild(path);

      // Hit area
      const hit = svgEl('path', { d, fill:'none', stroke:'transparent', 'stroke-width':16, cursor:'crosshair' });
      hit.addEventListener('mouseenter', ev => showEdgeTooltip(ev, e, src, tgt, color, ttEl));
      hit.addEventListener('mousemove',  ev => moveTooltip(ev, ttEl));
      hit.addEventListener('mouseleave', ()  => hideTooltip(ttEl));
      svg.appendChild(hit);
    });

    // ── Nodes ─────────────────────────────────────────────────────
    const PW = 180; // pill full-width
    SIMP_ACTORS.forEach(a => {
      const active = activeIds.has(a.id);
      const op = active ? 1 : 0.2;
      const g = svgEl('g', { transform:`translate(${a.x},${a.y})`, opacity:op, cursor:'pointer' });

      g.appendChild(svgEl('rect', { x:-(PW/2), y:-15, width:PW, height:30, rx:15,
        fill:a.bg, stroke:a.color, 'stroke-width':1.5 }));

      const t = svgEl('text', { x:0, y:4, 'text-anchor':'middle',
        'font-size':11, fill:'#e6edf3', 'font-family':'Inter,sans-serif',
        'font-weight':500, 'pointer-events':'none' });
      t.textContent = a.label;
      g.appendChild(t);

      svg.appendChild(g);
    });
  }

  render(0);

}).catch(err => {
  console.error('Load error:', err);
  document.getElementById('episodeTitle').textContent = 'Error loading data';
  document.getElementById('summary').textContent =
    'Serve via HTTP server (e.g. python -m http.server 8080). Error: ' + err.message;
});
</script>
